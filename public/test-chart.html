<!DOCTYPE html>
<html>
<head>
    <title>Test Income Trend Chart</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .chart-container { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .chart { display: flex; align-items: flex-end; gap: 8px; height: 200px; margin: 20px 0; }
        .bar { flex-grow: 1; background: #3b82f6; border-radius: 4px 4px 0 0; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test Income Trend Chart Rendering</h1>
    
    <div class="chart-container">
        <h2>Daily Income Chart</h2>
        <div id="dailyChart" class="chart"></div>
        <div id="dailyStats"></div>
    </div>

    <div class="chart-container">
        <h2>API Response</h2>
        <div id="debug" class="debug">Loading...</div>
    </div>

    <script>
        function formatCurrency(value) {
            return 'Rp ' + Number(value).toLocaleString('id-ID');
        }

        function renderChart(containerId, data, color) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const maxValue = data.maxValue > 0 ? data.maxValue : 1;

            data.series.forEach(point => {
                const height = data.maxValue > 0 ? Math.max(8, Math.round((point.value / maxValue) * 100)) : 8;
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.background = color;
                bar.style.height = height + '%';
                bar.title = point.label + ': ' + formatCurrency(point.value);
                container.appendChild(bar);
            });
        }

        // Fetch the endpoint
        fetch('/dashboard/income-trend-data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('debug').textContent = JSON.stringify(data, null, 2);
                
                renderChart('dailyChart', data.daily, '#3b82f6');
                document.getElementById('dailyStats').innerHTML = `
                    <div><strong>Today:</strong> ${formatCurrency(data.daily.currentValue)}</div>
                    <div><strong>Yesterday:</strong> ${formatCurrency(data.daily.previousValue)}</div>
                    <div><strong>Change:</strong> ${data.daily.deltaPercent >= 0 ? '+' : ''}${Number(data.daily.deltaPercent).toFixed(1)}%</div>
                `;
            })
            .catch(error => {
                document.getElementById('debug').textContent = 'Error: ' + error.message;
            });
    </script>
</body>
</html>
